<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deal Hunter Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --surface: #111; --surface2: #1a1a1a; --border: #222;
    --accent: #00ff88; --accent2: #ff3366; --warn: #ffaa00; --text: #f0f0f0;
    --muted: #555; --glitch: #ff0055;
    --fresh: #00ff88; --recent: #ffaa00; --stale: #ff3366; --dead: #555;
    --crit: #ff0055; --high: #ff6600; --med: #ffaa00;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  body::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,136,0.015) 2px, rgba(0,255,136,0.015) 4px); pointer-events: none; z-index: 1000; }

  header { border-bottom: 1px solid var(--border); padding: 0 1rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; background: rgba(10,10,10,0.95); backdrop-filter: blur(12px); z-index: 100; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 3px; color: var(--accent); }
  .logo span { color: var(--accent2); }
  .header-actions { display: flex; align-items: center; gap: 0.8rem; }
  .filter-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'Space Mono', monospace; font-size: 0.6rem; padding: 0.4rem 0.7rem; cursor: pointer; border-radius: 2px; letter-spacing: 1px; text-transform: uppercase; }
  .filter-btn.active-filter { border-color: var(--accent); color: var(--accent); }
  .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .pulse-dot.live { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

  .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 1px solid var(--border); }
  .stat { padding: 0.65rem 0.4rem; border-right: 1px solid var(--border); text-align: center; }
  .stat:last-child { border-right: none; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; line-height: 1; color: var(--accent); }
  .stat-value.red { color: var(--crit); }
  .stat-value.warn { color: var(--warn); }
  .stat-label { font-family: 'Space Mono', monospace; font-size: 0.48rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-top: 0.2rem; }

  .preset-bar { display: flex; gap: 0.3rem; padding: 0.6rem; overflow-x: auto; border-bottom: 1px solid var(--border); -webkit-overflow-scrolling: touch; }
  .preset-chip { flex-shrink: 0; font-family: 'Space Mono', monospace; font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.5px; padding: 0.35rem 0.7rem; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; border-radius: 2px; white-space: nowrap; }
  .preset-chip.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,136,0.08); }
  .preset-chip.custom { border-style: dashed; }

  .feed-wrap { padding: 0.7rem; }
  .feed-header { display: flex; justify-content: space-between; margin-bottom: 0.6rem; align-items: center; }
  .feed-title { font-family: 'Space Mono', monospace; font-size: 0.55rem; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); }
  .last-updated { font-family: 'Space Mono', monospace; font-size: 0.5rem; color: var(--muted); text-align: right; }

  .deals-grid { display: grid; grid-template-columns: 1fr; gap: 1px; background: var(--border); }
  @media (min-width: 700px) { .deals-grid { grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); } }

  .deal-card { background: var(--surface); padding: 0.85rem; position: relative; animation: slideIn 0.3s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  .deal-card.viewed { opacity: 0.55; }
  .deal-card.viewed::after { content: '✓'; position: absolute; top: 0.5rem; right: 0.5rem; color: var(--muted); font-size: 0.8rem; }
  .deal-card.is-glitch { border-left: 3px solid var(--glitch); }

  .score-row { display: flex; justify-content: space-between; margin-bottom: 0.5rem; align-items: center; gap: 0.4rem; flex-wrap: wrap; }
  .score-badge { font-family: 'Bebas Neue', sans-serif; font-size: 0.9rem; padding: 0.2rem 0.55rem; border-radius: 2px; letter-spacing: 1px; }
  .score-critical { background: var(--crit); color: var(--bg); }
  .score-high { background: var(--high); color: var(--bg); }
  .score-medium { background: var(--med); color: var(--bg); }
  .score-low { background: rgba(100,100,100,0.2); color: var(--muted); }
  .source-badges { display: flex; gap: 0.2rem; flex-wrap: wrap; }
  .source-badge { font-family: 'Space Mono', monospace; font-size: 0.48rem; letter-spacing: 0.5px; padding: 0.15rem 0.35rem; border-radius: 2px; text-transform: uppercase; border: 1px solid; }
  .sb-hukd-hot { border-color: rgba(255,102,0,0.4); color: var(--high); background: rgba(255,102,0,0.1); }
  .sb-hukd-new { border-color: rgba(0,255,136,0.4); color: var(--accent); background: rgba(0,255,136,0.1); }
  .sb-reddit-hukd, .sb-reddit-ukdeals { border-color: rgba(255,69,0,0.4); color: #ff4500; background: rgba(255,69,0,0.1); }
  .sb-latestdeals, .sb-bitterwallet { border-color: rgba(100,100,200,0.4); color: #6668dd; background: rgba(100,100,200,0.1); }

  .glitch-tag { display: inline-block; font-family: 'Space Mono', monospace; font-size: 0.5rem; letter-spacing: 1px; color: var(--glitch); background: rgba(255,0,85,0.12); padding: 0.18rem 0.4rem; border: 1px solid rgba(255,0,85,0.4); border-radius: 2px; margin-bottom: 0.5rem; }

  .primary-row { display: flex; gap: 0.35rem; margin-bottom: 0.6rem; }
  .discount-pill { font-family: 'Bebas Neue', sans-serif; font-size: 1.25rem; color: var(--bg); background: var(--accent); padding: 0.35rem 0.5rem; min-width: 52px; text-align: center; border-radius: 2px; display: flex; align-items: center; justify-content: center; }
  .discount-pill.massive { background: var(--accent2); }
  .discount-pill.none { background: rgba(100,100,100,0.2); color: var(--muted); font-size: 0.8rem; }
  .temp-pill { font-family: 'Bebas Neue', sans-serif; font-size: 1.05rem; padding: 0.35rem 0.5rem; min-width: 52px; text-align: center; border-radius: 2px; display: flex; align-items: center; justify-content: center; gap: 0.15rem; }
  .temp-cold { background: rgba(100,100,100,0.2); color: var(--muted); }
  .temp-warm { background: rgba(255,170,0,0.15); color: var(--warn); }
  .temp-hot { background: rgba(255,102,0,0.15); color: var(--high); }
  .temp-fire { background: rgba(255,0,85,0.15); color: var(--crit); }
  .age-pill { font-family: 'Space Mono', monospace; font-size: 0.55rem; padding: 0 0.4rem; border-radius: 2px; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; gap: 0.25rem; flex: 1; justify-content: center; }
  .age-fresh { background: rgba(0,255,136,0.15); color: var(--fresh); border: 1px solid rgba(0,255,136,0.5); }
  .age-recent { background: rgba(255,170,0,0.12); color: var(--recent); border: 1px solid rgba(255,170,0,0.4); }
  .age-stale { background: rgba(255,51,102,0.1); color: var(--stale); border: 1px solid rgba(255,51,102,0.3); }
  .age-dead { background: rgba(100,100,100,0.1); color: var(--dead); border: 1px solid var(--border); }

  .deal-title { font-size: 0.85rem; font-weight: 500; line-height: 1.35; color: var(--text); margin-bottom: 0.5rem; }

  .retailer-row { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
  .retailer-badge { font-family: 'Space Mono', monospace; font-size: 0.58rem; text-transform: uppercase; letter-spacing: 1px; padding: 0.22rem 0.45rem; background: rgba(255,170,0,0.08); border: 1px solid rgba(255,170,0,0.3); color: var(--warn); }
  .trust-good { background: rgba(0,255,136,0.1); color: var(--accent); border: 1px solid rgba(0,255,136,0.3); padding: 0.22rem 0.4rem; font-family: 'Space Mono', monospace; font-size: 0.55rem; border-radius: 2px; }
  .trust-mid { background: rgba(255,170,0,0.1); color: var(--warn); border: 1px solid rgba(255,170,0,0.3); padding: 0.22rem 0.4rem; font-family: 'Space Mono', monospace; font-size: 0.55rem; border-radius: 2px; }
  .trust-low { background: rgba(255,51,102,0.1); color: var(--accent2); border: 1px solid rgba(255,51,102,0.3); padding: 0.22rem 0.4rem; font-family: 'Space Mono', monospace; font-size: 0.55rem; border-radius: 2px; }
  .trust-unknown { background: rgba(100,100,100,0.1); color: var(--muted); border: 1px solid var(--border); padding: 0.22rem 0.4rem; font-family: 'Space Mono', monospace; font-size: 0.55rem; border-radius: 2px; }

  .price-row { display: flex; align-items: baseline; gap: 0.5rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
  .price-now { font-family: 'Bebas Neue', sans-serif; font-size: 1.25rem; color: var(--accent); }
  .price-was { font-family: 'Space Mono', monospace; font-size: 0.68rem; color: var(--muted); text-decoration: line-through; }
  .price-unverified { font-family: 'Space Mono', monospace; font-size: 0.52rem; color: var(--warn); font-style: italic; }
  .price-missing { font-family: 'Space Mono', monospace; font-size: 0.58rem; color: var(--muted); font-style: italic; }
  .category-tag { font-family: 'Space Mono', monospace; font-size: 0.5rem; text-transform: uppercase; letter-spacing: 1px; padding: 0.18rem 0.4rem; border: 1px solid var(--border); color: var(--muted); margin-left: auto; }

  .deal-footer { display: flex; gap: 0.3rem; align-items: center; }
  .go-btn { font-family: 'Space Mono', monospace; font-size: 0.55rem; text-transform: uppercase; letter-spacing: 1.5px; padding: 0.5rem 0.55rem; background: transparent; border: 1px solid var(--accent); color: var(--accent); text-decoration: none; display: inline-block; flex: 1; text-align: center; min-width: 0; cursor: pointer; }
  .go-btn.buy { border-color: var(--warn); color: var(--warn); }
  .hide-btn { font-family: 'Space Mono', monospace; font-size: 0.55rem; padding: 0.5rem 0.55rem; background: transparent; border: 1px solid var(--muted); color: var(--muted); cursor: pointer; }

  .empty-state { grid-column: 1/-1; text-align: center; padding: 3rem 1rem; }
  .empty-icon { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; color: var(--border); letter-spacing: 5px; margin-bottom: 0.8rem; }
  .empty-text { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; line-height: 1.6; }

  .error-banner { background: rgba(255,51,102,0.08); border: 1px solid rgba(255,51,102,0.2); color: var(--accent2); font-family: 'Space Mono', monospace; font-size: 0.58rem; padding: 0.6rem 0.8rem; display: none; }
  .error-banner.show { display: block; }

  .start-btn { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 4px; padding: 0.8rem 2rem; background: var(--accent); color: var(--bg); border: none; cursor: pointer; box-shadow: 0 0 30px rgba(0,255,136,0.4); z-index: 200; border-radius: 2px; }

  /* Filter drawer */
  .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 300; display: none; }
  .drawer-overlay.open { display: block; }
  .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 90%; max-width: 420px; background: var(--surface); border-left: 1px solid var(--border); z-index: 400; transform: translateX(100%); transition: transform 0.25s ease; overflow-y: auto; padding: 1rem; }
  .drawer.open { transform: translateX(0); }
  .drawer h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 3px; color: var(--accent); margin-bottom: 0.8rem; }
  .drawer-section { margin-bottom: 1.4rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
  .drawer-section h3 { font-family: 'Space Mono', monospace; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: var(--warn); margin-bottom: 0.6rem; }
  .filter-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.6rem; }
  .filter-row label { font-family: 'Space Mono', monospace; font-size: 0.58rem; color: var(--text); flex: 1; }
  .filter-row input[type=range] { -webkit-appearance: none; flex: 2; height: 2px; background: var(--border); outline: none; }
  .filter-row input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; }
  .filter-row input[type=range]::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; border: none; }
  .filter-val { font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem; color: var(--accent); min-width: 46px; text-align: right; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0; font-family: 'Space Mono', monospace; font-size: 0.6rem; }
  .toggle-row label { color: var(--text); }
  .toggle { position: relative; width: 36px; height: 20px; background: var(--border); border-radius: 10px; cursor: pointer; }
  .toggle.on { background: var(--accent); }
  .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: var(--surface); border-radius: 50%; transition: left 0.15s; }
  .toggle.on::after { left: 18px; }
  .multi-select { display: flex; flex-wrap: wrap; gap: 0.3rem; }
  .ms-chip { font-family: 'Space Mono', monospace; font-size: 0.55rem; padding: 0.3rem 0.5rem; border: 1px solid var(--border); color: var(--muted); cursor: pointer; border-radius: 2px; text-transform: uppercase; }
  .ms-chip.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,136,0.08); }
  .drawer-actions { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  .drawer-btn { flex: 1; font-family: 'Space Mono', monospace; font-size: 0.58rem; padding: 0.6rem; background: transparent; border: 1px solid var(--border); color: var(--muted); cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
  .drawer-btn.primary { border-color: var(--accent); color: var(--accent); }
  .drawer-btn.danger { border-color: var(--accent2); color: var(--accent2); }
  .close-drawer { position: absolute; top: 1rem; right: 1rem; background: transparent; border: none; color: var(--muted); font-size: 1.5rem; cursor: pointer; }
  .keyword-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.6rem; padding: 0.5rem; margin-bottom: 0.5rem; border-radius: 2px; }
  .keyword-list { display: flex; flex-wrap: wrap; gap: 0.3rem; }
  .keyword-pill { font-family: 'Space Mono', monospace; font-size: 0.55rem; padding: 0.3rem 0.5rem; background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.3); color: var(--accent); border-radius: 2px; }
  .keyword-pill::after { content: ' ×'; cursor: pointer; color: var(--accent2); }
  .keyword-match { background: rgba(255,170,0,0.2); padding: 0 2px; border-radius: 2px; }

  .retailer-search-link { font-family: 'Space Mono', monospace; font-size: 0.52rem; color: var(--muted); text-decoration: none; border-bottom: 1px dotted var(--muted); margin-left: auto; }

  .loading-bar { height: 2px; background: var(--border); position: relative; overflow: hidden; }
  .loading-fill { position: absolute; top: 0; left: 0; height: 100%; background: var(--accent); width: 0%; transition: width 0.1s linear; }
</style>
</head>
<body>

<header>
  <div class="logo">DEAL<span>HUNTER</span></div>
  <div class="header-actions">
    <div class="pulse-dot" id="pulseDot"></div>
    <button class="filter-btn" id="filterBtn" onclick="openDrawer()">⚙️ Filters</button>
  </div>
</header>

<div class="loading-bar"><div class="loading-fill" id="loadingFill"></div></div>
<div class="error-banner" id="errorBanner"></div>

<div class="stats-bar">
  <div class="stat"><div class="stat-value" id="statShown">0</div><div class="stat-label">Showing</div></div>
  <div class="stat"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Total</div></div>
  <div class="stat"><div class="stat-value red" id="statGlitch">0</div><div class="stat-label">Errors</div></div>
  <div class="stat"><div class="stat-value" id="statRefresh">30s</div><div class="stat-label">Refresh</div></div>
</div>

<div class="preset-bar" id="presetBar"></div>

<div class="feed-wrap">
  <div class="feed-header">
    <span class="feed-title" id="modeLabel">Live Feed</span>
    <span class="last-updated" id="lastUpdated">—</span>
  </div>
  <div class="deals-grid" id="dealsGrid">
    <div class="empty-state">
      <div class="empty-icon">STANDBY</div>
      <div class="empty-text">Tap start to begin</div>
    </div>
  </div>
</div>

<div style="height: 100px;"></div>
<button onclick="startMonitor()" id="startBtn" class="start-btn">START</button>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <button class="close-drawer" onclick="closeDrawer()">×</button>
  <h2>FILTERS</h2>

  <div class="drawer-actions">
    <button class="drawer-btn primary" onclick="saveCustomPreset()">💾 Save as Preset</button>
    <button class="drawer-btn danger" onclick="resetFilters()">↺ Reset</button>
  </div>

  <div class="drawer-section">
    <h3>📊 Thresholds</h3>
    <div class="filter-row"><label>Min Score</label><input type="range" id="fMinScore" min="0" max="800" step="50"><span class="filter-val" id="vMinScore">0</span></div>
    <div class="filter-row"><label>Min Discount %</label><input type="range" id="fMinDiscount" min="0" max="95" step="5"><span class="filter-val" id="vMinDiscount">0%</span></div>
    <div class="filter-row"><label>Min Temp °</label><input type="range" id="fMinTemp" min="0" max="2000" step="50"><span class="filter-val" id="vMinTemp">0</span></div>
    <div class="filter-row"><label>Min RRP £</label><input type="range" id="fMinRrp" min="0" max="500" step="5"><span class="filter-val" id="vMinRrp">£0</span></div>
    <div class="filter-row"><label>Min Trust</label><input type="range" id="fMinTrust" min="0" max="5" step="0.1"><span class="filter-val" id="vMinTrust">0</span></div>
  </div>

  <div class="drawer-section">
    <h3>⏰ Age</h3>
    <div class="filter-row"><label>Max Age (hrs)</label><input type="range" id="fMaxAge" min="0" max="72" step="1"><span class="filter-val" id="vMaxAge">All</span></div>
  </div>

  <div class="drawer-section">
    <h3>📡 Sources</h3>
    <div class="multi-select" id="sourceChips"></div>
  </div>

  <div class="drawer-section">
    <h3>🏷️ Categories</h3>
    <div class="multi-select" id="catChips"></div>
  </div>

  <div class="drawer-section">
    <h3>🚫 Exclusions</h3>
    <div class="toggle-row"><label>Hide vouchers/referrals</label><div class="toggle" data-key="exVoucher" onclick="toggleFlag(this)"></div></div>
    <div class="toggle-row"><label>Hide insurance/broadband</label><div class="toggle" data-key="exService" onclick="toggleFlag(this)"></div></div>
    <div class="toggle-row"><label>Hide hotels/flights</label><div class="toggle" data-key="exTravel" onclick="toggleFlag(this)"></div></div>
    <div class="toggle-row"><label>Hide subscriptions</label><div class="toggle" data-key="exSubscription" onclick="toggleFlag(this)"></div></div>
    <div class="toggle-row"><label>Hide grocery</label><div class="toggle" data-key="exGrocery" onclick="toggleFlag(this)"></div></div>
    <div class="toggle-row"><label>Hide unknown retailers</label><div class="toggle" data-key="exUnknown" onclick="toggleFlag(this)"></div></div>
  </div>

  <div class="drawer-section">
    <h3>⚡ Glitch Override</h3>
    <div class="toggle-row"><label>Always show price errors</label><div class="toggle on" data-key="glitchOverride" onclick="toggleFlag(this)"></div></div>
  </div>

  <div class="drawer-section">
    <h3>👁️ Viewed History</h3>
    <div class="toggle-row"><label>Show viewed deals</label><div class="toggle on" data-key="showViewed" onclick="toggleFlag(this)"></div></div>
    <div class="toggle-row"><label>Show hidden deals</label><div class="toggle" data-key="showHidden" onclick="toggleFlag(this)"></div></div>
    <button class="drawer-btn danger" onclick="clearHistory()" style="width:100%;margin-top:0.5rem">Clear All History</button>
  </div>

  <div class="drawer-section">
    <h3>🔑 Keyword Alerts</h3>
    <input class="keyword-input" id="keywordInput" placeholder="Add keyword e.g. lego, dyson" onkeydown="if(event.key==='Enter')addKeyword()">
    <div class="keyword-list" id="keywordList"></div>
  </div>
</div>

<script>
const PROXY_URL = "https://sweet-block-34d2.hamzahsarang-b15.workers.dev/";
const INTERVAL = 30000;

const DEFAULT_FILTERS = {
  minScore: 0, minDiscount: 0, minTemp: 0, minRrp: 0, minTrust: 0, maxAge: 0,
  sources: ["hukd-hot","hukd-new","latestdeals","reddit-hukd","reddit-ukdeals","bitterwallet"],
  categories: ["all"],
  exVoucher: false, exService: false, exTravel: false, exSubscription: false, exGrocery: false, exUnknown: false,
  glitchOverride: true, showViewed: true, showHidden: false,
  keywords: []
};

const BUILT_IN_PRESETS = {
  "Everything": { ...DEFAULT_FILTERS }
};

let allDeals = [];
let filters = loadFilters();
let viewedIds = new Set(loadJSON("dh_viewed", []));
let hiddenIds = new Set(loadJSON("dh_hidden", []));
let customPresets = loadJSON("dh_presets", {});
let activePreset = loadString("dh_active_preset", "Everything");
let countdown = 30, running = false;

function loadJSON(key, def) { try { return JSON.parse(localStorage.getItem(key)) || def; } catch(e) { return def; } }
function saveJSON(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
function loadString(key, def) { return localStorage.getItem(key) || def; }
function saveString(key, val) { localStorage.setItem(key, val); }
function loadFilters() { return { ...DEFAULT_FILTERS, ...loadJSON("dh_filters", {}) }; }
function saveFilters() { saveJSON("dh_filters", filters); }

function startMonitor() {
  document.getElementById("startBtn").style.display = "none";
  running = true;
  document.getElementById("pulseDot").classList.add("live");
  fetchDeals();
  setInterval(fetchDeals, INTERVAL);
  startCountdown();
  setInterval(renderDeals, 30000);
}

function startCountdown() {
  countdown = 30;
  document.getElementById("statRefresh").textContent = countdown + "s";
  const cd = setInterval(() => {
    document.getElementById("statRefresh").textContent = (--countdown) + "s";
    if (countdown <= 0) { clearInterval(cd); if (running) startCountdown(); }
  }, 1000);
}

async function fetchDeals() {
  animateLoading(); hideError();
  try {
    const res = await fetch(PROXY_URL);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    if (!data.deals) throw new Error("No deals field");
    allDeals = data.deals;
    let statusText = "";
    if (data.sourceStatus) {
      statusText = Object.keys(data.sourceStatus).map(k => k.split("-")[0][0].toUpperCase() + ":" + data.sourceStatus[k]).join(" ");
    }
    document.getElementById("lastUpdated").textContent = statusText + " | " + new Date().toLocaleTimeString();
    updateStats(); renderDeals();
  } catch(e) {
    showError("Fetch failed: " + e.message);
  }
}

function updateStats() {
  document.getElementById("statTotal").textContent = allDeals.length;
  document.getElementById("statGlitch").textContent = allDeals.filter(d => d.isGlitch).length;
}

function getFreshness(ageMins) {
  if (ageMins < 15) return { label: ageMins < 1 ? "NOW" : ageMins + "m", cls: "age-fresh" };
  if (ageMins < 60) return { label: ageMins + "m", cls: "age-recent" };
  if (ageMins < 240) return { label: Math.floor(ageMins/60) + "h", cls: "age-stale" };
  const hrs = Math.floor(ageMins/60);
  if (hrs < 24) return { label: hrs + "h", cls: "age-dead" };
  return { label: Math.floor(hrs/24) + "d", cls: "age-dead" };
}

function getTempClass(temp) {
  if (temp < 100) return "temp-cold";
  if (temp < 300) return "temp-warm";
  if (temp < 800) return "temp-hot";
  return "temp-fire";
}

function getScoreClass(score) {
  if (score >= 600) return "score-critical";
  if (score >= 400) return "score-high";
  if (score >= 200) return "score-medium";
  return "score-low";
}

function matchesKeywords(deal) {
  if (!filters.keywords || filters.keywords.length === 0) return false;
  const hay = deal.title.toLowerCase();
  return filters.keywords.some(k => hay.includes(k.toLowerCase()));
}

function filterDeal(d) {
  // Glitch override
  if (filters.glitchOverride && d.isGlitch) return true;
  // Keyword match always passes
  if (matchesKeywords(d)) return true;

  // Hidden
  if (hiddenIds.has(d.id) && !filters.showHidden) return false;
  if (!hiddenIds.has(d.id) && false) return false;
  // Viewed
  if (viewedIds.has(d.id) && !filters.showViewed) return false;

  // Thresholds
  if (d.score < filters.minScore) return false;
  if (d.discount < filters.minDiscount) return false;
  if (d.temp < filters.minTemp) return false;
  const rrp = d.priceWas || d.priceNow || 0;
  if (rrp < filters.minRrp) return false;
  if (filters.minTrust > 0 && (d.retailerTrust === null || d.retailerTrust < filters.minTrust)) return false;

  // Age
  if (filters.maxAge > 0 && d.ageMins > filters.maxAge * 60) return false;

  // Sources
  if (filters.sources.length > 0) {
    const matchesSource = (d.sources || [d.source]).some(s => filters.sources.includes(s));
    if (!matchesSource) return false;
  }

  // Categories
  if (!filters.categories.includes("all")) {
    if (!filters.categories.includes(d.category)) return false;
  }

  // Exclusions
  const ef = d.exclusionFlags || {};
  if (filters.exVoucher && ef.voucher) return false;
  if (filters.exService && ef.service) return false;
  if (filters.exTravel && ef.travel) return false;
  if (filters.exSubscription && ef.subscription) return false;
  if (filters.exGrocery && ef.grocery) return false;
  if (filters.exUnknown && !d.retailer) return false;

  return true;
}

function highlightKeywords(title) {
  if (!filters.keywords || filters.keywords.length === 0) return title;
  let result = title;
  filters.keywords.forEach(k => {
    const re = new RegExp("(" + k.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "gi");
    result = result.replace(re, '<span class="keyword-match">$1</span>');
  });
  return result;
}

function renderDeals() {
  const grid = document.getElementById("dealsGrid");
  const filtered = allDeals.filter(filterDeal);
  document.getElementById("statShown").textContent = filtered.length;

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">NONE</div><div class="empty-text">No deals match filters<br>Adjust filters or wait for new deals</div></div>';
    return;
  }

  grid.innerHTML = filtered.map(d => renderCard(d)).join("");
}

function renderCard(d) {
  const fresh = getFreshness(d.ageMins);
  const tempCls = getTempClass(d.temp);
  const scoreCls = getScoreClass(d.score);
  const isViewed = viewedIds.has(d.id);

  const discPill = d.discount > 0
    ? '<div class="discount-pill ' + (d.discount >= 70 ? "massive" : "") + '">' + d.discount + '%</div>'
    : '<div class="discount-pill none">—</div>';

  const tempEmoji = d.temp >= 800 ? "🔥" : d.temp >= 300 ? "♨" : d.temp >= 100 ? "•" : "·";

  const sourceBadges = (d.sources || [d.source]).map(s => '<span class="source-badge sb-' + s + '">' + s.replace("hukd-","").replace("reddit-","r/") + '</span>').join("");

  const glitchTag = d.isGlitch ? '<div><span class="glitch-tag">⚡ PRICE ERROR</span></div>' : "";

  let trustBadge = '<span class="trust-unknown">? trust</span>';
  if (d.retailerTrust !== null && d.retailerTrust !== undefined) {
    if (d.retailerTrust >= 4.0) trustBadge = '<span class="trust-good">⭐ ' + d.retailerTrust + '</span>';
    else if (d.retailerTrust >= 3.0) trustBadge = '<span class="trust-mid">⭐ ' + d.retailerTrust + '</span>';
    else trustBadge = '<span class="trust-low">⚠ ' + d.retailerTrust + '</span>';
  }

  const retailerText = d.retailer || "Unknown";
  const q = encodeURIComponent((d.retailer || "") + " " + d.title.split(" ").slice(0,6).join(" "));
  const retailerRow = '<div class="retailer-row"><span class="retailer-badge">🏪 ' + retailerText + '</span>' + trustBadge + '<a href="https://www.google.com/search?q=' + q + '" target="_blank" class="retailer-search-link">Google →</a></div>';

  let priceRow = '<div class="price-row"><span class="price-missing">No price detected</span></div>';
  if (d.priceNow !== null) {
    const wasHtml = d.priceWas ? '<span class="price-was">£' + d.priceWas.toFixed(2) + '</span>' : "";
    const conf = d.priceConfidence === "low" ? '<span class="price-unverified">⚠ verify</span>' : "";
    priceRow = '<div class="price-row"><span class="price-now">£' + d.priceNow.toFixed(2) + '</span>' + wasHtml + conf + '<span class="category-tag">' + d.category + '</span></div>';
  }

  const buyBtn = d.externalLink ? '<a href="' + d.externalLink + '" target="_blank" class="go-btn buy" onclick="markViewed(\'' + d.id.replace(/'/g,"\\'") + '\')">BUY</a>' : "";
  const hiddenLabel = hiddenIds.has(d.id) ? "UNHIDE" : "HIDE";

  return '<div class="deal-card ' + (d.isGlitch ? "is-glitch" : "") + ' ' + (isViewed ? "viewed" : "") + '">' +
    '<div class="score-row"><span class="score-badge ' + scoreCls + '">🎯 ' + d.score + '</span><div class="source-badges">' + sourceBadges + '</div></div>' +
    glitchTag +
    '<div class="primary-row">' + discPill + '<div class="temp-pill ' + tempCls + '">' + tempEmoji + ' ' + d.temp + '°</div><div class="age-pill ' + fresh.cls + '">' + fresh.label + '</div></div>' +
    '<div class="deal-title">' + highlightKeywords(d.title.substring(0,100)) + (d.title.length > 100 ? "…" : "") + '</div>' +
    retailerRow + priceRow +
    '<div class="deal-footer">' + buyBtn +
    '<a href="' + d.hotukLink + '" target="_blank" class="go-btn" onclick="markViewed(\'' + d.id.replace(/'/g,"\\'") + '\')">SOURCE</a>' +
    '<button class="hide-btn" onclick="toggleHide(\'' + d.id.replace(/'/g,"\\'") + '\')">' + hiddenLabel + '</button>' +
    '</div></div>';
}

function markViewed(id) { viewedIds.add(id); saveJSON("dh_viewed", [...viewedIds]); }
function toggleHide(id) {
  if (hiddenIds.has(id)) hiddenIds.delete(id); else hiddenIds.add(id);
  saveJSON("dh_hidden", [...hiddenIds]);
  renderDeals();
}
function clearHistory() {
  if (!confirm("Clear all viewed and hidden history?")) return;
  viewedIds.clear(); hiddenIds.clear();
  saveJSON("dh_viewed", []); saveJSON("dh_hidden", []);
  renderDeals();
}

// Drawer
function openDrawer() {
  document.getElementById("drawer").classList.add("open");
  document.getElementById("drawerOverlay").classList.add("open");
  syncFiltersToUI();
}
function closeDrawer() {
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("drawerOverlay").classList.remove("open");
}

function syncFiltersToUI() {
  document.getElementById("fMinScore").value = filters.minScore;
  document.getElementById("vMinScore").textContent = filters.minScore;
  document.getElementById("fMinDiscount").value = filters.minDiscount;
  document.getElementById("vMinDiscount").textContent = filters.minDiscount + "%";
  document.getElementById("fMinTemp").value = filters.minTemp;
  document.getElementById("vMinTemp").textContent = filters.minTemp + "°";
  document.getElementById("fMinRrp").value = filters.minRrp;
  document.getElementById("vMinRrp").textContent = "£" + filters.minRrp;
  document.getElementById("fMinTrust").value = filters.minTrust;
  document.getElementById("vMinTrust").textContent = filters.minTrust.toFixed(1);
  document.getElementById("fMaxAge").value = filters.maxAge;
  document.getElementById("vMaxAge").textContent = filters.maxAge === 0 ? "All" : filters.maxAge + "h";

  document.querySelectorAll(".toggle").forEach(t => {
    t.classList.toggle("on", !!filters[t.dataset.key]);
  });

  renderSourceChips();
  renderCatChips();
  renderKeywords();
}

function renderSourceChips() {
  const sources = [
    {id:"hukd-hot", label:"HUKD Hot"},
    {id:"hukd-new", label:"HUKD New"},
    {id:"latestdeals", label:"LatestDeals"},
    {id:"reddit-hukd", label:"r/HUKD"},
    {id:"reddit-ukdeals", label:"r/UKDeals"},
    {id:"bitterwallet", label:"Bitterwallet"}
  ];
  document.getElementById("sourceChips").innerHTML = sources.map(s =>
    '<div class="ms-chip ' + (filters.sources.includes(s.id) ? "active" : "") + '" onclick="toggleSource(\'' + s.id + '\')">' + s.label + '</div>'
  ).join("");
}

function renderCatChips() {
  const cats = ["all","Electronics","Gaming","Toys","Fashion","Beauty","Watches","Computing","Home","Food","General"];
  document.getElementById("catChips").innerHTML = cats.map(c =>
    '<div class="ms-chip ' + (filters.categories.includes(c) ? "active" : "") + '" onclick="toggleCat(\'' + c + '\')">' + c + '</div>'
  ).join("");
}

function toggleSource(id) {
  const idx = filters.sources.indexOf(id);
  if (idx >= 0) filters.sources.splice(idx, 1);
  else filters.sources.push(id);
  saveFilters(); renderSourceChips(); renderDeals();
}

function toggleCat(c) {
  if (c === "all") {
    filters.categories = ["all"];
  } else {
    const idx = filters.categories.indexOf(c);
    if (idx >= 0) filters.categories.splice(idx, 1);
    else { filters.categories = filters.categories.filter(x => x !== "all"); filters.categories.push(c); }
    if (filters.categories.length === 0) filters.categories = ["all"];
  }
  saveFilters(); renderCatChips(); renderDeals();
}

function toggleFlag(el) {
  const key = el.dataset.key;
  filters[key] = !filters[key];
  el.classList.toggle("on", filters[key]);
  saveFilters(); renderDeals();
}

function resetFilters() {
  filters = { ...DEFAULT_FILTERS };
  saveFilters(); syncFiltersToUI(); renderDeals();
}

function renderKeywords() {
  document.getElementById("keywordList").innerHTML = filters.keywords.map((k,i) =>
    '<span class="keyword-pill" onclick="removeKeyword(' + i + ')">' + k + '</span>'
  ).join("");
}

function addKeyword() {
  const input = document.getElementById("keywordInput");
  const val = input.value.trim();
  if (!val) return;
  filters.keywords.push(val);
  input.value = "";
  saveFilters(); renderKeywords(); renderDeals();
}

function removeKeyword(i) {
  filters.keywords.splice(i, 1);
  saveFilters(); renderKeywords(); renderDeals();
}

function saveCustomPreset() {
  const name = prompt("Preset name?");
  if (!name) return;
  customPresets[name] = { ...filters };
  saveJSON("dh_presets", customPresets);
  renderPresetBar();
}

function loadPreset(name) {
  if (BUILT_IN_PRESETS[name]) filters = { ...BUILT_IN_PRESETS[name] };
  else if (customPresets[name]) filters = { ...customPresets[name] };
  activePreset = name;
  saveString("dh_active_preset", name);
  saveFilters();
  syncFiltersToUI(); renderPresetBar(); renderDeals();
}

function deletePreset(name) {
  if (!confirm("Delete preset '" + name + "'?")) return;
  delete customPresets[name];
  saveJSON("dh_presets", customPresets);
  renderPresetBar();
}

function renderPresetBar() {
  const bar = document.getElementById("presetBar");
  const builtIn = Object.keys(BUILT_IN_PRESETS).map(n =>
    '<div class="preset-chip ' + (activePreset === n ? "active" : "") + '" onclick="loadPreset(\'' + n + '\')">' + n + '</div>'
  );
  const custom = Object.keys(customPresets).map(n =>
    '<div class="preset-chip custom ' + (activePreset === n ? "active" : "") + '" onclick="loadPreset(\'' + n + '\')" ondblclick="deletePreset(\'' + n + '\')">✦ ' + n + '</div>'
  );
  bar.innerHTML = builtIn.concat(custom).join("");
}

// Sliders live-update
document.addEventListener("DOMContentLoaded", () => {
  const sliderMap = {
    fMinScore: {key:"minScore", label:"vMinScore", suffix:""},
    fMinDiscount: {key:"minDiscount", label:"vMinDiscount", suffix:"%"},
    fMinTemp: {key:"minTemp", label:"vMinTemp", suffix:"°"},
    fMinRrp: {key:"minRrp", label:"vMinRrp", prefix:"£", suffix:""},
    fMinTrust: {key:"minTrust", label:"vMinTrust", suffix:"", decimal:true},
    fMaxAge: {key:"maxAge", label:"vMaxAge", suffix:"h", zeroLabel:"All"}
  };
  Object.keys(sliderMap).forEach(id => {
    const el = document.getElementById(id);
    const cfg = sliderMap[id];
    el.oninput = () => {
      const v = cfg.decimal ? parseFloat(el.value) : parseInt(el.value);
      filters[cfg.key] = v;
      let txt = (cfg.prefix || "") + (cfg.decimal ? v.toFixed(1) : v) + (cfg.suffix || "");
      if (cfg.zeroLabel && v === 0) txt = cfg.zeroLabel;
      document.getElementById(cfg.label).textContent = txt;
      saveFilters(); renderDeals();
    };
  });
  renderPresetBar();
});

function animateLoading() {
  const f = document.getElementById("loadingFill");
  f.style.width = "0%";
  setTimeout(() => f.style.width = "60%", 50);
  setTimeout(() => f.style.width = "100%", 800);
  setTimeout(() => f.style.width = "0%", 1200);
}
function showError(msg) { const e = document.getElementById("errorBanner"); e.textContent = "⚠ " + msg; e.classList.add("show"); }
function hideError() { document.getElementById("errorBanner").classList.remove("show"); }
</script>
</body>
